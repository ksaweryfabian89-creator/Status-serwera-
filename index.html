<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status - BlockZone.PL</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#050000,#260000,#050000);
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

.logo{
    font-size:64px;
    font-weight:bold;
    color:#ff2222;
    text-shadow:0 0 25px red;
    margin-bottom:20px;
}

.status-box{
    background:#140000;
    border:2px solid #ff2222;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 35px rgba(255,0,0,.45);
    margin-bottom:30px;
}

.status-title{
    font-size:32px;
    color:#ff4444;
    font-weight:bold;
}

.ip{
    font-size:28px;
    font-weight:bold;
    margin-top:15px;
}

.info{
    color:#ccc;
    font-size:18px;
    margin-top:12px;
}

.mclist-widget{
    max-width:850px;
    margin:30px auto;
    background:white;
    padding:15px;
    border-radius:18px;
    box-shadow:0 0 35px rgba(255,0,0,.6);
}

.mclist-widget iframe{
    width:100%;
    height:180px;
    border:0;
}

.footer{
    margin-top:50px;
    color:#777;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">BLOCKZONE.PL</div>

<div class="status-box">
    <div class="status-title">STATUS SERWERA</div>
    <div class="ip">blockzone.6mc.pl</div>
    <div class="info">Status online/offline i liczba graczy poniżej:</div>
</div>

<div class="mclist-widget">
<iframe src="https://www.mclist.pl/widget/blockzone.6mc.pl"></iframe>
</div>

<div class="footer">
© 2026 BlockZone.PL
</div>

</div>

</body>
</html>
